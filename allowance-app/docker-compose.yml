services:
  web:
    build: .
    container_name: allowance-app
    ports:
      - "5000:5000"
    volumes:
      - allowance-data:/data
    environment:
      - SECRET_KEY=change-this-to-a-random-string-in-production
      - DATABASE_PATH=/data/allowance.db
    restart: unless-stopped

volumes:
  allowance-data:
