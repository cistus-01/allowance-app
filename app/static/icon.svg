<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5a9e6f"/>
      <stop offset="100%" style="stop-color:#3a6148"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- 給与袋（封筒本体） -->
  <rect x="100" y="160" width="312" height="220" rx="18" ry="18" fill="#ffffff" opacity="0.95"/>

  <!-- 封筒のフラップ（上部の三角） -->
  <polygon points="100,160 256,268 412,160" fill="#e8f5ee"/>
  <line x1="100" y1="160" x2="256" y2="268" stroke="#c5dece" stroke-width="2"/>
  <line x1="412" y1="160" x2="256" y2="268" stroke="#c5dece" stroke-width="2"/>

  <!-- ¥ マーク -->
  <text x="256" y="348"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="110"
        font-weight="900"
        fill="#4a7c59"
        text-anchor="middle"
        dominant-baseline="auto">¥</text>

  <!-- 星（左上） -->
  <text x="136" y="140" font-size="52" text-anchor="middle" fill="#f8b500">★</text>
  <!-- 星（右上） -->
  <text x="388" y="130" font-size="36" text-anchor="middle" fill="#f8b500" opacity="0.85">★</text>
  <!-- 星（右下） -->
  <text x="408" y="408" font-size="28" text-anchor="middle" fill="#f8d060" opacity="0.7">★</text>
</svg>
