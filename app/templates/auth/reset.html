{% extends 'base.html' %}
{% block title %}新しいパスワードを設定{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5 col-sm-8">
    <div class="card">
      <div class="card-header text-center py-3">
        <i class="bi bi-lock fs-3 me-2"></i>新しいパスワードを設定
      </div>
      <div class="card-body p-4">
        <form method="post">
          <div class="mb-3">
            <label class="form-label fw-bold">新しいパスワード</label>
            <input type="password" name="password" class="form-control form-control-lg"
                   placeholder="6文字以上" required minlength="6" autofocus>
          </div>
          <div class="mb-4">
            <label class="form-label fw-bold">パスワードの確認</label>
            <input type="password" name="confirm" class="form-control form-control-lg"
                   placeholder="もう一度入力" required minlength="6">
          </div>
          <button type="submit" class="btn btn-primary w-100 btn-lg">パスワードを変更する</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
