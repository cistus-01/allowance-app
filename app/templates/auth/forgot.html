{% extends 'base.html' %}
{% block title %}パスワードをお忘れの方{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5 col-sm-8">
    <div class="card">
      <div class="card-header text-center py-3">
        <i class="bi bi-key fs-3 me-2"></i>パスワードのリセット
      </div>
      <div class="card-body p-4">
        <p class="text-muted text-center mb-4">登録時のメールアドレスを入力してください。<br>リセット用のリンクを発行します。</p>
        <form method="post">
          <div class="mb-4">
            <label class="form-label fw-bold">メールアドレス</label>
            <input type="email" name="email" class="form-control form-control-lg"
                   placeholder="登録時のメールアドレス" required autofocus>
          </div>
          <button type="submit" class="btn btn-primary w-100 btn-lg">リセットリンクを発行</button>
        </form>
        <hr class="my-3">
        <p class="text-center text-muted mb-0 small">
          <a href="{{ url_for('auth.login') }}">ログインに戻る</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
