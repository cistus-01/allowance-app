{% extends 'base.html' %}
{% block title %}ログイン{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5 col-sm-8">
    <div class="card">
      <div class="card-header text-center py-3">
        <i class="bi bi-coin fs-3 me-2"></i>おこづかい帳
      </div>
      <div class="card-body p-4">
        <h5 class="mb-3 text-center">ログイン</h5>
        <form method="post">
          <div class="mb-3">
            <label class="form-label">ユーザー名</label>
            <input type="text" name="username" class="form-control form-control-lg" required autofocus>
          </div>
          <div class="mb-4">
            <label class="form-label">パスワード</label>
            <input type="password" name="password" class="form-control form-control-lg" required>
          </div>
          <button type="submit" class="btn btn-primary w-100 btn-lg">ログイン</button>
        </form>
        <hr class="my-3">
        <p class="text-center text-muted mb-1 small">
          はじめての方は
          <a href="{{ url_for('register.index') }}">新規登録（30日無料）</a>
        </p>
        <p class="text-center text-muted mb-0 small">
          <a href="{{ url_for('auth.forgot') }}">パスワードをお忘れの方</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
